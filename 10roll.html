<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>100連ガチャ</title>

<style>

body{
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
  margin:0;
  padding-top:20px;
}

h1{
  font-size:40px;
  margin-bottom:10px;
}

p{
  color:#aaa;
}

#count{
  margin:20px;
  font-size:24px;
  color:#00ffcc;
}

#result{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:10px;
  margin:30px auto;
  max-width:700px;
}

.num{
  background:#222;
  padding:12px;
  font-size:20px;
  border-radius:8px;
  color:#00ffcc;
}

button{
  font-size:20px;
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
}

</style>
</head>

<body>

<h1>100連ガチャ</h1>

<p>
0〜10000の数字を集めるゲーム
</p>

<div id="count">
集めた数字: 0 / 10001
</div>

<div id="result"></div>

<button onclick="gacha100()">
100連ガチャ
</button>

<button onclick="goStorage()">
保存庫へ
</button>

<button onclick="resetData()">
データ削除
</button>

<br>

<button onclick="location.href='index.html'">
戻る
</button>

<script>

// 所持データ
let data = JSON.parse(localStorage.getItem("nums")) || [];

// 表示更新
updateCount();

function gacha100(){

  const container = document.getElementById("result");

  container.innerHTML = "";

  // 重複防止
  const used = new Set(data);

  // 全部集め終わった
  if(used.size >= 10001){

    alert("すべての数字を集めました！");

    return;

  }

  const newNums = [];

  // 100個生成
  while(newNums.length < 100 && used.size < 10001){

    const num = Math.floor(Math.random() * 10001);

    // 未所持のみ追加
    if(!used.has(num)){

      used.add(num);

      newNums.push(num);

    }

  }

  // 表示
  newNums.forEach(num => {

    const div = document.createElement("div");

    div.className = "num";

    div.textContent = num;

    container.appendChild(div);

  });

  // 保存
  data = [...used];

  localStorage.setItem("nums", JSON.stringify(data));

  // カウント更新
  updateCount();

}

function updateCount(){

  document.getElementById("count").textContent =
    "集めた数字: " + data.length + " / 10001";

}

function goStorage(){

  window.location.href = "storage.html";

}

function resetData(){

  localStorage.removeItem("nums");

  data = [];

  updateCount();

  document.getElementById("result").innerHTML = "";

}

</script>

</body>
</html>
