<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>100連ガチャ</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
  padding-top:20px;
}

h1{
  font-size:36px;
}

#result{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:10px;
  margin:30px auto;
  max-width:700px;
}

.num{
  background:#222;
  padding:12px;
  font-size:20px;
  border-radius:8px;
  color:#00ffcc;
}

button{
  font-size:20px;
  padding:10px 20px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>100連ガチャ</h1>

<div id="result"></div>

<button onclick="gacha100()">100連ガチャ</button>
<button onclick="goStorage()">保存庫へ</button>

<br>

<button onclick="location.href='index.html'">
戻る
</button>

<script>

function gacha100(){

  const container = document.getElementById("result");
  container.innerHTML = "";

  let data = JSON.parse(localStorage.getItem("nums")) || [];

  for(let i = 0; i < 100; i++){

    // 0〜10000
    const num = Math.floor(Math.random() * 10001);

    // 表示
    const div = document.createElement("div");
    div.className = "num";
    div.textContent = num;

    container.appendChild(div);

    // 保存
    data.push(num);
  }

  localStorage.setItem("nums", JSON.stringify(data));
}

function goStorage(){
  window.location.href = "storage.html";
}

</script>

</body>
</html>
