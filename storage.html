<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>保存庫</title>

<style>

body{
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
  margin:0;
  padding-top:20px;
}

h1{
  font-size:40px;
  margin-bottom:10px;
}

#list{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:10px;
  margin:30px auto;
  max-width:700px;
}

.num{
  background:#222;
  padding:12px;
  font-size:20px;
  border-radius:8px;
  color:#00ffcc;
}

button{
  font-size:20px;
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
}

#count{
  margin:20px;
  font-size:24px;
  color:#00ffcc;
}

</style>
</head>

<body>

<h1>保存庫</h1>

<div id="count">
0 個保存中
</div>

<button onclick="goGacha()">
ガチャへ戻る
</button>

<button onclick="clearData()">
リセット
</button>

<div id="list"></div>

<script>

function load(){

  let data = JSON.parse(localStorage.getItem("nums")) || [];

  // 昇順ソート
  data.sort((a, b) => a - b);

  // 個数表示
  document.getElementById("count").textContent =
    data.length + " 個保存中";

  const list = document.getElementById("list");

  list.innerHTML = "";

  data.forEach(num => {

    const div = document.createElement("div");

    div.className = "num";

    div.textContent = num;

    list.appendChild(div);

  });

}

function goGacha(){

  window.location.href = "index.html";

}

function clearData(){

  localStorage.removeItem("nums");

  load();

}

load();

</script>

</body>
</html>
