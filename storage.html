<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>保存庫</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
  padding-top:40px;
}

.num{
  background:#222;
  margin:5px;
  padding:10px;
  font-size:22px;
  border-radius:8px;
  color:#00ffcc;
}

button{
  font-size:18px;
  padding:10px 20px;
  margin:10px;
}
</style>
</head>

<body>

<h1>保存庫</h1>

<button onclick="goGacha()">ガチャへ戻る</button>
<button onclick="clearData()">リセット</button>

<div id="list"></div>

<script>
function load(){
  let data = JSON.parse(localStorage.getItem("nums")) || [];

  // 🔽 昇順ソート
  data.sort((a, b) => a - b);

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(num => {
    const div = document.createElement("div");
    div.className = "num";
    div.textContent = num;
    list.appendChild(div);
  });
}

function goGacha(){
  window.location.href = "index.html";
}

function clearData(){
  localStorage.removeItem("nums");
  load();
}

load();
</script>

</body>
</html>
