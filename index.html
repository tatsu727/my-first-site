<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>数字10連ガチャ</title>

<style>
  body{
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
    padding-top:60px;
  }

  h1{
    font-size:40px;
  }

  #results{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:10px;
    margin:40px auto;
    max-width:600px;
  }

  .num{
    background:#222;
    padding:20px;
    font-size:28px;
    border-radius:10px;
    color:#00ffcc;
  }

  button{
    font-size:28px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    cursor:pointer;
  }

  button:hover{
    transform:scale(1.05);
  }
</style>
</head>

<body>

<h1>数字10連ガチャ</h1>

<div id="results"></div>

<button onclick="gacha10()">
  10連ガチャ
</button>

<script>
function gacha10(){
  const container = document.getElementById("results");
  container.innerHTML = "";

  for(let i = 0; i < 10; i++){
    const num = Math.floor(Math.random() * 10000001);

    const div = document.createElement("div");
    div.className = "num";
    div.textContent = num;

    container.appendChild(div);
  }
}
</script>

</body>
</html>
