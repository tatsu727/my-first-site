<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>クリックゲーム</title>

  <style>
    body{
      background:#111;
      color:white;
      font-family:sans-serif;
      text-align:center;
      padding-top:80px;
    }

    h1{
      font-size:50px;
    }

    #score{
      font-size:40px;
      margin:30px;
    }

    button{
      font-size:30px;
      padding:20px 40px;
      border:none;
      border-radius:15px;
      cursor:pointer;
    }

    button:hover{
      transform:scale(1.05);
    }
  </style>
</head>
<body>

  <h1>クリックゲーム</h1>

  <div id="score">0</div>

  <button onclick="addScore()">
    クリック！
  </button>

<script>
  // 読み込み（保存データがあれば使う）
  let score = Number(localStorage.getItem("score")) || 0;

  // 表示更新
  document.getElementById("score").textContent = score;

  function addScore(){
    score++;
    document.getElementById("score").textContent = score;
    localStorage.setItem("score", score);
  }

  // 1秒ごとに増える
  setInterval(() => {
    score++;
    document.getElementById("score").textContent = score;
    localStorage.setItem("score", score);
  }, 1000);
  
</script>

</body>
</html>
