<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ガチャ</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
  padding-top:80px;
}

button{
  font-size:24px;
  padding:15px 30px;
  border-radius:10px;
  cursor:pointer;
}

#result{
  font-size:50px;
  margin:40px;
  color:#00ffcc;
}
</style>
</head>

<body>

<h1>数字ガチャ</h1>

<div id="result">-</div>

<button onclick="draw()">ガチャを引く</button>

<button onclick="goStorage()">保存庫へ</button>

<script>
function draw(){
  const num = Math.floor(Math.random() * 10000001);

  document.getElementById("result").textContent = num;

  // 保存（配列で管理）
  let data = JSON.parse(localStorage.getItem("nums")) || [];
  data.push(num);
  localStorage.setItem("nums", JSON.stringify(data));
}

function goStorage(){
  window.location.href = "storage.html";
}
</script>

</body>
</html>
