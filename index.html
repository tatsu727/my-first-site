<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>放置テストゲーム</title>

  <style>
    body{
      background:#111;
      color:white;
      font-family:sans-serif;
      text-align:center;
      padding-top:80px;
    }

    #score{
      font-size:50px;
      margin:30px;
    }

    button{
      font-size:30px;
      padding:20px 40px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }
  </style>
</head>

<body>

  <h1>放置テスト</h1>

  <div id="score">0</div>

  <button onclick="clickBoost()">
    クリック（倍率UP）
  </button>

<script>
  // =====================
  // 基本データ
  // =====================
  let score = Number(localStorage.getItem("score")) || 0;

  let multiplier = 1.0;

  let playSeconds = 0;

  // 表示
  function render(){
    document.getElementById("score").textContent = Math.floor(score);
  }

  render();

  // =====================
  // クリック
  // =====================
  function clickBoost(){
    multiplier += 0.2; // 永続で増える（インフレ実験用）
  }

  // =====================
  // 1秒ごとの収入
  // =====================
  setInterval(() => {

    playSeconds++;

    // log成長（放置ベース）
    let logBonus = Math.log(playSeconds + 1);

    // 合計収入
    score += 1 * multiplier + logBonus;

    render();

    localStorage.setItem("score", score);

  }, 1000);

  // =====================
  // 10秒ごとに倍率上昇
  // =====================
  setInterval(() => {

    multiplier += 0.1; // 無限に増える（テスト用）

  }, 10000);

</script>

</body>
</html>
