<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>くじ引き</title>

<style>
body{
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding-top:100px;
}

h1{
  font-size:50px;
}

#result{
  font-size:80px;
  margin:40px;
  transition:0.2s;
}

.win{
  color:gold;
}

.lose{
  color:gray;
}

button{
  font-size:30px;
  padding:20px 40px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:10px;
}

button:hover{
  transform:scale(1.05);
}

#count{
  margin-top:20px;
  color:#aaa;
}
</style>
</head>

<body>

<h1>くじ引き</h1>

<p>当たり確率 50%</p>

<div id="result">?</div>

<button onclick="draw()">
くじを引く
</button>

<br>

<button onclick="location.href='index.html'">
戻る
</button>

<div id="count">
引いた回数: 0
</div>

<script>

let count = 0;

function draw(){

  const result = document.getElementById("result");

  // 抽選っぽくする
  result.textContent = "...";
  result.className = "";

  setTimeout(() => {

    const r = Math.random();

    if(r < 0.5){
      result.textContent = "当たり";
      result.className = "win";
    }
    else{
      result.textContent = "ハズレ";
      result.className = "lose";
    }

    count++;
    document.getElementById("count").textContent =
      "引いた回数: " + count;

  }, 300);

}
</script>

</body>
</html>
