<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>４択くじ</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
  padding-top:20px;
}

h1{
  font-size:50px;
}

#cards{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:50px;
  flex-wrap:wrap;
}

.card{
  width:200px;
  height:260px;
  background:#222;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  cursor:pointer;
  transition:0.2s;
  user-select:none;
}

.card:hover{
  transform:scale(1.05);
  background:#333;
}

.win{
  background:gold;
  color:black;
}

.lose{
  background:gray;
  color:white;
}

button{
  margin-top:40px;
  font-size:25px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>４択くじ</h1>

<p>1枚だけ当たりがあります</p>

<div id="cards">

  <div class="card" onclick="draw(0)">?</div>
  <div class="card" onclick="draw(1)">?</div>
  <div class="card" onclick="draw(2)">?</div>
  <div class="card" onclick="draw(3)">?</div>

</div>

<button onclick="location.href='index.html'">
戻る
</button>

<script>

let drawing = false;

// 当たりカードをランダム決定
let winCard = Math.floor(Math.random() * 4);

function draw(index){

  if(drawing){
    return;
  }

  drawing = true;

  const cards = document.querySelectorAll(".card");

  // 全カードを公開
  cards.forEach((card, i) => {

    if(i === winCard){
      card.textContent = "当たり";
      card.classList.add("win");
    }
    else{
      card.textContent = "ハズレ";
      card.classList.add("lose");
    }

  });

  // 1秒後リセット
  setTimeout(() => {

    cards.forEach(card => {
      card.textContent = "?";
      card.className = "card";
    });

    // 新しい当たり位置
    winCard = Math.floor(Math.random() * 4);

    drawing = false;

  }, 1000);

}

</script>

</body>
</html>
