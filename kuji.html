<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カードくじ</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
  padding-top:80px;
}

h1{
  font-size:50px;
}

#cards{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:50px;
}

.card{
  width:180px;
  height:250px;
  background:#222;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  cursor:pointer;
  transition:0.2s;
  user-select:none;
}

.card:hover{
  transform:scale(1.05);
  background:#333;
}

.win{
  background:gold;
  color:black;
}

.lose{
  background:gray;
  color:white;
}

button{
  margin-top:40px;
  font-size:25px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>カードくじ</h1>

<p>好きなカードを選んでください</p>

<div id="cards">

  <div class="card" onclick="draw(this)">
    ?
  </div>

  <div class="card" onclick="draw(this)">
    ?
  </div>

</div>

<button onclick="resetCards()">
リセット
</button>

<button onclick="location.href='index.html'">
戻る
</button>

<script>

function draw(card){

  // すでに引いてたら無効
  if(card.textContent.trim() !== "?"){
    return;
  }

  const r = Math.random();

  if(r < 0.5){
    card.textContent = "当たり";
    card.classList.add("win");
  }
  else{
    card.textContent = "ハズレ";
    card.classList.add("lose");
  }

}

function resetCards(){

  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    card.textContent = "?";
    card.className = "card";
  });

}

</script>

</body>
</html>
