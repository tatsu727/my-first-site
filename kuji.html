<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カードくじ</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
  padding-top:80px;
}

h1{
  font-size:50px;
}

#cards{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:50px;
}

.card{
  width:180px;
  height:250px;
  background:#222;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.05);
  background:#333;
}

#result{
  font-size:70px;
  margin-top:50px;
}

.win{
  color:gold;
}

.lose{
  color:gray;
}

button{
  margin-top:40px;
  font-size:25px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>カードくじ</h1>

<p>好きなカードを選んでください</p>

<div id="cards">

  <div class="card" onclick="draw()">
    ?
  </div>

  <div class="card" onclick="draw()">
    ?
  </div>

</div>

<div id="result">
  
</div>

<button onclick="location.href='index.html'">
戻る
</button>

<script>

function draw(){

  const result = document.getElementById("result");

  const r = Math.random();

  if(r < 0.5){
    result.textContent = "当たり";
    result.className = "win";
  }
  else{
    result.textContent = "ハズレ";
    result.className = "lose";
  }

}

</script>

</body>
</html>
